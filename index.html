<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>대길산도 물때</title>
<style>
:root {
    --bg: #0a0f1e; --bg2: #111827; --bg3: #1a2235;
    --fg: #e2e8f0; --fg2: #94a3b8; --fg3: #64748b;
    --accent: #38bdf8; --orange: #f97316; --green: #34d399; --red: #f87171;
    --border: #1e2d45;
    --m1: #38bdf8; --m2: #a78bfa; --m3: #f97316; --m4: #34d399;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
    min-height: 100dvh; padding-bottom: env(safe-area-inset-bottom);
}

/* ── Header ── */
.header {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 12px 16px; position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
}
.header h1 { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
.header .sub { font-size: 0.72rem; color: var(--fg3); }
.header .temp {
    font-size: 1.3rem; font-weight: 700; color: var(--orange);
}

/* ── Date chips ── */
.chips {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 8px 12px; display: flex; gap: 6px; overflow-x: auto;
    position: sticky; top: 48px; z-index: 99;
    scrollbar-width: none; -webkit-overflow-scrolling: touch;
}
.chips::-webkit-scrollbar { display: none; }
.chip {
    flex-shrink: 0; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 14px; font-size: 0.75rem;
    color: var(--fg2); cursor: pointer; white-space: nowrap;
    transition: all 0.15s; -webkit-tap-highlight-color: transparent;
}
.chip.today { border-color: var(--accent); color: var(--accent); font-weight: 700; }
.chip.sat { color: #60a5fa; } .chip.sun { color: var(--red); }

/* ── Tide cards ── */
.container { max-width: 600px; margin: 0 auto; padding: 12px; }
.tide-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; margin-bottom: 10px;
    transition: all 0.2s; position: relative; overflow: hidden;
}
.tide-card.today {
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(56,189,248,0.08);
}
.tide-card .card-left {
    position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    border-radius: 12px 0 0 12px;
}
.tide-card.today .card-left { background: var(--accent); }

.card-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px; padding-left: 2px;
}
.card-date {
    display: flex; align-items: baseline; gap: 8px;
}
.card-date .day { font-size: 1.1rem; font-weight: 700; }
.card-date .dow { font-size: 0.75rem; color: var(--fg3); }
.card-date .lunar { font-size: 0.7rem; color: var(--fg3); }

.card-badges { display: flex; gap: 6px; align-items: center; }
.badge {
    padding: 3px 10px; border-radius: 12px; font-size: 0.72rem; font-weight: 700;
}
.badge.tide { background: rgba(56,189,248,0.15); color: var(--accent); }
.badge.flow-high { background: rgba(249,115,22,0.15); color: var(--orange); }
.badge.flow-mid { background: rgba(52,211,153,0.15); color: var(--green); }
.badge.flow-low { background: rgba(148,163,184,0.15); color: var(--fg2); }

/* ── Tide times ── */
.tide-times { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.tide-group { padding-left: 2px; }
.tide-group .label {
    font-size: 0.68rem; color: var(--fg3); text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 4px;
}
.tide-group .label.manjo { color: #60a5fa; }
.tide-group .label.ganjo { color: #f97316; }

.tide-item {
    display: flex; align-items: baseline; gap: 6px;
    padding: 3px 0; font-family: 'SF Mono', 'Consolas', monospace;
}
.tide-item .time { font-size: 0.95rem; font-weight: 700; }
.tide-item .height { font-size: 0.75rem; color: var(--fg2); }
.tide-item .diff {
    font-size: 0.65rem; padding: 1px 5px; border-radius: 4px;
}
.tide-item .diff.up { background: rgba(52,211,153,0.15); color: var(--green); }
.tide-item .diff.down { background: rgba(248,113,113,0.15); color: var(--red); }

/* ── Sun/Moon row ── */
.card-footer {
    display: flex; gap: 16px; margin-top: 10px; padding-top: 10px;
    border-top: 1px solid var(--border); font-size: 0.7rem; color: var(--fg3);
}
.card-footer span { display: flex; align-items: center; gap: 4px; }

/* ── Weather section ── */
.weather-section {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; margin-bottom: 10px;
}
.weather-section h3 {
    font-size: 0.85rem; color: var(--fg2); margin-bottom: 8px;
}
.weather-text { font-size: 0.75rem; color: var(--fg3); line-height: 1.6; }

/* ── Loading ── */
.loading {
    text-align: center; padding: 40px; color: var(--fg3);
}
.spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Footer ── */
.footer {
    text-align: center; padding: 16px; font-size: 0.68rem; color: var(--fg3);
}
.footer a { color: var(--accent); text-decoration: none; }

/* ── Moon SVG ── */
.moon-icon {
    width: 24px; height: 24px; display: inline-block; vertical-align: middle;
}
</style>
</head>
<body>

<div class="header">
    <div>
        <h1>⚓ 대길산도 물때</h1>
        <div class="sub" id="updateTime">불러오는 중...</div>
    </div>
    <div class="temp" id="seaTemp">--°C</div>
</div>

<div class="chips" id="chips"></div>

<div class="container" id="content">
    <div class="loading"><div class="spinner"></div>물때 정보를 불러오는 중...</div>
</div>

<div class="footer">
    Data from <a href="https://www.badatime.com/1442/tide" target="_blank">바다타임</a>
    · Auto-updated every 3 hours
</div>

<script>
// ═══════════════════════════════════════════
// Moon SVG icons
// ═══════════════════════════════════════════
function moonSVG(phase) {
    const p = parseInt(phase) || 15;
    // Simple moon phases based on lunar day (1-30)
    let path;
    if (p <= 1 || p >= 29) path = 'M12 2A10 10 0 110 12 22 10 10 0 0112 2z'; // new moon
    else if (p <= 6) path = 'M12 2A10 10 0 100 22 12 10 10 0 0112 2z'; // waxing crescent
    else if (p <= 8) path = 'M12 2A10 10 0 0012 22 10 10 0 0112 2z'; // first quarter
    else if (p <= 12) path = 'M12 2A10 10 0 000 22 12 10 10 0 0112 2z'; // waxing gibbous
    else if (p <= 16) path = 'M12 2A10 10 0 110 22 12A10 10 0 1012 2z'; // full moon
    else if (p <= 20) path = 'M12 2A10 10 0 000 12 22 10 10 0 0112 2z'; // waning gibbous
    else if (p <= 23) path = 'M12 2A10 10 0 0022 12 10 10 0 0112 2z'; // last quarter
    else path = 'M12 2A10 10 0 100 22 12 10 10 0 0112 2z'; // waning crescent

    return `<svg width="24" height="24" viewBox="0 0 24 24" fill="#fbbf24" opacity="0.9">
        <path d="${path}"/></svg>`;
}

// ═══════════════════════════════════════════
// Render
// ═══════════════════════════════════════════
const today = new Date();
const todayStr = `${today.getMonth()+1}/${today.getDate()}`;
let tideData = [];

function getFlowClass(pct) {
    if (pct == null) return '';
    if (pct >= 90) return 'flow-high';
    if (pct >= 60) return 'flow-mid';
    return 'flow-low';
}

function getFlowText(pct) {
    if (pct == null) return '최대';
    return `${pct}%`;
}

function renderTideCards(month, day) {
    // Filter to show 15 days starting from the selected day
    const startIdx = tideData.findIndex(t => t.month === month && t.day === day);
    if (startIdx < 0) return;

    const days = tideData.slice(startIdx, startIdx + 15);
    const container = document.getElementById('content');
    const isCurrentMonth = month === today.getMonth() + 1;

    let html = '';
    days.forEach(t => {
        const dateStr = `${t.month}/${t.day}`;
        const isToday = dateStr === todayStr && isCurrentMonth;
        const flowCls = getFlowClass(t.flow_pct);
        const flowTxt = getFlowText(t.flow_pct);

        // Manjo rows
        const manjoHTML = (t.manjo || []).map(m => `
            <div class="tide-item">
                <span class="time">${m.time}</span>
                <span class="height">${m.height}cm</span>
                <span class="diff ${m.diff > 0 ? 'up' : 'down'}">${m.diff > 0 ? '+' : ''}${m.diff || ''}</span>
            </div>`).join('');

        // Ganjo rows
        const ganjoHTML = (t.ganjo || []).map(g => `
            <div class="tide-item">
                <span class="time">${g.time}</span>
                <span class="height">${g.height}cm</span>
                <span class="diff ${g.diff > 0 ? 'up' : 'down'}">${g.diff > 0 ? '+' : ''}${g.diff || ''}</span>
            </div>`).join('');

        html += `
        <div class="tide-card ${isToday ? 'today' : ''}">
            <div class="card-left"></div>
            <div class="card-top">
                <div class="card-date">
                    <span class="day">${t.month}/${t.day}(${t.dow})</span>
                    <span class="lunar">🌙 ${t.lunar}</span>
                </div>
                <div class="card-badges">
                    <span class="badge tide">${t.tide_class}물</span>
                    ${flowCls ? `<span class="badge ${flowCls}">흐름 ${flowTxt}</span>` : ''}
                </div>
            </div>
            <div class="tide-times">
                <div class="tide-group">
                    <div class="label manjo">▲ 만조</div>
                    ${manjoHTML || '<div class="tide-item"><span class="time">-</span></div>'}
                </div>
                <div class="tide-group">
                    <div class="label ganjo">▼ 간조</div>
                    ${ganjoHTML || '<div class="tide-item"><span class="time">-</span></div>'}
                </div>
            </div>
            <div class="card-footer">
                <span>☀️ ${t.sunrise_set || '-'}</span>
                <span>🌙 ${t.moonrise_set || '-'}</span>
            </div>
        </div>`;
    });

    container.innerHTML = html;
}

function renderChips(month, day) {
    const chips = document.getElementById('chips');
    // Show 7 quick-jump dates
    let html = '';
    for (let i = 0; i < 7; i++) {
        const d = new Date(today);
        d.setDate(today.getDate() + i);
        const m = d.getMonth() + 1;
        const dt = d.getDate();
        const dow = ['일','월','화','수','목','금','토'][d.getDay()];
        const isActive = m === month && dt === day;
        const isSat = d.getDay() === 6;
        const isSun = d.getDay() === 0;
        const isToday = i === 0;
        let cls = 'chip';
        if (isActive) cls += ' today';
        if (isSat) cls += ' sat';
        if (isSun) cls += ' sun';
        html += `<button class="${cls}" onclick="navigate(${m},${dt})">${isToday ? '오늘' : ''} ${m}/${dt}(${dow})</button>`;
    }
    chips.innerHTML = html;
}

function navigate(month, day) {
    renderTideCards(month, day);
    renderChips(month, day);
}

// ═══════════════════════════════════════════
// Load data
// ═══════════════════════════════════════════
async function load() {
    try {
        const resp = await fetch('tide_data.json?t=' + Date.now());
        const data = await resp.json();
        tideData = data.tides || [];

        // Update header
        document.getElementById('updateTime').textContent =
            'Updated ' + (data.updated || '').replace('T', ' ').slice(0, 16);

        const temp = data.sea_temp;
        document.getElementById('seaTemp').textContent =
            temp ? temp.toFixed(1) + '°C' : '--°C';

        // Show weather section at top
        if (data.sea_weather && data.sea_weather.length > 0) {
            const container = document.getElementById('content');
            const weatherDiv = document.createElement('div');
            weatherDiv.className = 'weather-section';
            weatherDiv.innerHTML = `
                <h3>🌊 바다날씨 · 충남남부앞바다</h3>
                <div class="weather-text">${data.sea_weather.slice(0, 5).join('<br>')}</div>`;
            container.prepend(weatherDiv);
        }

        // Render current date
        const m = today.getMonth() + 1;
        const d = today.getDate();
        navigate(m, d);

    } catch (e) {
        document.getElementById('content').innerHTML =
            `<div class="loading">⚠️ 데이터를 불러오지 못했습니다.<br><small>${e.message}</small></div>`;
    }
}

load();
</script>
</body>
</html>
