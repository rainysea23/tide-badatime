<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>대길산도 물때</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0f1e;
      color: #e2e8f0;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 상단 바 ── */
    .topbar {
      background: #111827;
      border-bottom: 1px solid #1e2d45;
      padding: 0.6rem 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
      z-index: 10;
    }

    .topbar-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: #38bdf8;
      white-space: nowrap;
    }

    .topbar input[type="date"] {
      flex: 1;
      background: #1a2235;
      border: 1px solid #1e2d45;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 0.4rem 0.6rem;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      min-width: 0;
    }

    .topbar input[type="date"]:focus {
      border-color: #f97316;
    }

    .btn-go {
      background: #f97316;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.4rem 0.85rem;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-go:active { opacity: 0.8; transform: scale(0.97); }

    /* ── 날짜 빠른 선택 ── */
    .date-chips {
      background: #111827;
      border-bottom: 1px solid #1e2d45;
      padding: 0.4rem 0.75rem;
      display: flex;
      gap: 0.4rem;
      overflow-x: auto;
      flex-shrink: 0;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .date-chips::-webkit-scrollbar { display: none; }

    .chip {
      flex-shrink: 0;
      background: #1a2235;
      border: 1px solid #1e2d45;
      border-radius: 999px;
      padding: 0.25rem 0.7rem;
      font-size: 0.78rem;
      color: #94a3b8;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s;
    }

    .chip.active {
      background: rgba(249,115,22,0.2);
      border-color: #f97316;
      color: #f97316;
      font-weight: 700;
    }

    /* ── iframe ── */
    .iframe-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── 로딩 오버레이 ── */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: #0a0f1e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      z-index: 5;
      transition: opacity 0.3s;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #1e2d45;
      border-top-color: #f97316;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 0.85rem;
      color: #64748b;
    }

    /* ── 에러 ── */
    .error-overlay {
      position: absolute;
      inset: 0;
      background: #0a0f1e;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      z-index: 5;
      padding: 2rem;
      text-align: center;
    }

    .error-overlay.show { display: flex; }

    .error-icon { font-size: 3rem; }
    .error-msg { font-size: 0.9rem; color: #94a3b8; line-height: 1.6; }

    .btn-retry {
      background: #f97316;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1.5rem;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
  </style>
</head>
<body>

<!-- 상단 바 -->
<div class="topbar">
  <span class="topbar-title">⚓ 대길산도</span>
  <input type="date" id="dateInput" />
  <button class="btn-go" id="btnGo">조회</button>
</div>

<!-- 날짜 빠른 선택 -->
<div class="date-chips" id="dateChips"></div>

<!-- iframe 영역 -->
<div class="iframe-wrap">
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">물때 정보를 불러오는 중...</div>
  </div>
  <div class="error-overlay" id="errorOverlay">
    <div class="error-icon">🌊</div>
    <div class="error-msg">페이지를 불러오지 못했습니다.<br>네트워크 연결을 확인해주세요.</div>
    <button class="btn-retry" id="btnRetry">다시 시도</button>
  </div>
  <iframe id="tideFrame" title="바다타임 물때 정보" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
</div>

<script>
const LOCATION_ID = 1442;
const BASE_URL = `https://www.badatime.com/${LOCATION_ID}/tide`;

// ── 날짜 유틸 ──
function toYYYYMMDD(d) {
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}
function toInputVal(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fromInput(s) {
  return s.replace(/-/g,'');
}
function dayLabel(d) {
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getMonth()+1}/${d.getDate()}(${days[d.getDay()]})`;
}

// ── 상태 ──
const today = new Date();
let currentDate = toYYYYMMDD(today);

// ── 날짜 칩 생성 (오늘 포함 7일) ──
const chips = document.getElementById('dateChips');
for (let i = 0; i < 7; i++) {
  const d = new Date(today);
  d.setDate(today.getDate() + i);
  const ds = toYYYYMMDD(d);
  const chip = document.createElement('button');
  chip.className = 'chip' + (i === 0 ? ' active' : '');
  chip.textContent = i === 0 ? `오늘 ${dayLabel(d)}` : dayLabel(d);
  chip.dataset.date = ds;
  chip.addEventListener('click', () => navigate(ds));
  chips.appendChild(chip);
}

// ── 초기 날짜 설정 ──
document.getElementById('dateInput').value = toInputVal(today);

// ── 조회 버튼 ──
document.getElementById('btnGo').addEventListener('click', () => {
  const v = document.getElementById('dateInput').value;
  if (v) navigate(fromInput(v));
});

// ── 다시 시도 ──
document.getElementById('btnRetry').addEventListener('click', () => navigate(currentDate));

// ── 네비게이션 ──
function navigate(dateStr) {
  currentDate = dateStr;

  // 날짜 입력 업데이트
  document.getElementById('dateInput').value =
    `${dateStr.slice(0,4)}-${dateStr.slice(4,6)}-${dateStr.slice(6,8)}`;

  // 칩 활성화
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.toggle('active', c.dataset.date === dateStr);
  });

  // 로딩 표시
  showLoading();

  // iframe URL 설정
  const frame = document.getElementById('tideFrame');
  frame.src = `${BASE_URL}?date=${dateStr}`;
}

// ── iframe 이벤트 ──
const frame = document.getElementById('tideFrame');

frame.addEventListener('load', () => {
  // 로딩 숨기기
  hideLoading();
  // 에러 숨기기
  document.getElementById('errorOverlay').classList.remove('show');
});

frame.addEventListener('error', () => {
  hideLoading();
  document.getElementById('errorOverlay').classList.add('show');
});

// 타임아웃 처리 (15초 후에도 로딩 중이면 에러)
let loadTimer;
function showLoading() {
  clearTimeout(loadTimer);
  document.getElementById('loadingOverlay').classList.remove('hidden');
  document.getElementById('errorOverlay').classList.remove('show');
  loadTimer = setTimeout(() => {
    hideLoading();
    // iframe이 X-Frame-Options로 차단됐을 수도 있으므로 에러 대신 바로 숨김
  }, 8000);
}
function hideLoading() {
  clearTimeout(loadTimer);
  document.getElementById('loadingOverlay').classList.add('hidden');
}

// ── 시작 ──
navigate(currentDate);
</script>
</body>
</html>
